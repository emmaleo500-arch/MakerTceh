<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up · MakerTech Hub</title>
  <link rel="stylesheet" href="signup_styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <header>
    <div class="container nav-container">
      <div class="logo"><i class="fas fa-microchip"></i> MakerTech <span>Hub</span></div>
      <nav>
        <ul>
          <li><a href="homepage.html">Home</a></li>
          <li><a href="shop.html">Shop</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="signup.html" class="active btn-gold">Sign up</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-header gold-black">
      <div class="container"><h1><i class="fas fa-user-plus"></i> Create account</h1></div>
    </section>

    <section class="container form-section">
      <div class="form-card">
        <form id="signupForm">
          <div class="form-group">
            <label><i class="fas fa-user"></i> Full name</label>
            <input type="text" id="signupName" placeholder="John Doe" value="Demo User">
          </div>
          <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="signupEmail" placeholder="you@example.com" value="new@makertech.com">
          </div>
          <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="signupPassword" placeholder="Min 6 chars" value="password123">
          </div>
          <button type="submit" class="btn-gold btn-block">Sign up <i class="fas fa-user-check"></i></button>
          <p style="margin-top:1rem; text-align:center;">Already have an account? <a href="login.html" style="color:#b8860b;">Login</a></p>
          <div id="signupFeedback" class="feedback" style="display:none;"></div>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <div class="container"><p>© 2026 MakerTech Hub — gold & black</p></div>
  </footer>
  <script>
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value.trim();
      const fb = document.getElementById('signupFeedback');
      if (!name || !email || password.length < 6) {
        fb.style.display = 'block';
        fb.className = 'feedback error';
        fb.innerHTML = `<i class="fas fa-exclamation-circle"></i> Fill all fields, password min 6 chars.`;
        return;
      }
      // Simulate saving to DB
      fb.style.display = 'block';
      fb.className = 'feedback success';
      fb.innerHTML = `<i class="fas fa-check-circle"></i> Account created for ${name}! (backend + DB)`;
      // store in session as logged in
      sessionStorage.setItem('maker_user', JSON.stringify({ name, email }));
    });
  </script>
</body>
</html>
