<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · MakerTech Hub</title>
  <link rel="stylesheet" href="login_styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <header>
    <div class="container nav-container">
      <div class="logo"><i class="fas fa-microchip"></i> MakerTech <span>Hub</span></div>
      <nav>
        <ul>
          <li><a href="homepage.html">Home</a></li>
          <li><a href="shop.html">Shop</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="login.html" class="active">Login</a></li>
          <li><a href="signup.html" class="btn-gold">Sign up</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-header gold-black">
      <div class="container"><h1><i class="fas fa-sign-in-alt"></i> Login</h1></div>
    </section>

    <section class="container form-section">
      <div class="form-card">
        <form id="loginForm">
          <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" value="demo@makertech.com">
          </div>
          <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" value="password123">
          </div>
          <button type="submit" class="btn-gold btn-block">Login <i class="fas fa-arrow-right"></i></button>
          <p style="margin-top:1rem; text-align:center;">New? <a href="signup.html" style="color:#b8860b;">Create account</a></p>
          <div id="loginFeedback" class="feedback" style="display:none;"></div>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <div class="container"><p>@2026 MakerTech Hub</p></div>
  </footer>
  <script>
    // Simulated backend + database (in-memory)
    const users = [
      { email: "demo@makertech.com", password: "password123", name: "Demo User" },
      { email: "alice@makertech.com", password: "alice123", name: "Alice" }
    ];
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const fb = document.getElementById('loginFeedback');
      const user = users.find(u => u.email === email && u.password === password);
      if (user) {
        sessionStorage.setItem('maker_user', JSON.stringify(user));
        fb.style.display = 'block';
        fb.className = 'feedback success';
        fb.innerHTML = `<i class="fas fa-check-circle"></i> Welcome back, ${user.name}! (backend + DB)`;
      } else {
        fb.style.display = 'block';
        fb.className = 'feedback error';
        fb.innerHTML = `<i class="fas fa-exclamation-circle"></i> Invalid credentials.`;
      }
    });
  </script>
</body>
</html>
